<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Enigma-escape room </title>
</head>
<body>
    <div id="room1" class="turing fade-in-slow">
        <div class="oggetto-cliccabile macchina-da-scrivere" onclick="apriEnigmaFinale()"></div>
        <div class="oggetto-cliccabile mappa-mondo" onclick="mostraAtmosfera()"></div>
        <div class="oggetto-cliccabile schedario" onclick="mostraIndizio()"></div>
        <div class="oggetto-cliccabile scatoloni" onclick="mostraScatoloni()"></div>
    </div>
    <div class="modal fade" id="enigmaModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma bg-dark text-light border-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="modalTitle">Macchina Enigma Intercettata</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="playfair">Agente, abbiamo decifrato parte del messaggio. Ci serve l'anno cruciale in cui Alan Turing ha cambiato il corso della guerra.</p>
            <p class="special-elite text-warning fs-5">Inserisci il codice di 4 cifre:</p>
            <input type="text" id="codiceSoluzione" class="form-control form-control-lg text-center special-elite" placeholder="????">
          </div>
          <div class="modal-footer border-light">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-light text-dark" onclick="controllaEnigma()">Conferma Codice</button>
          </div>
        </div>
      </div>
    </div>
</body>
<script src="script.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
