<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Stanza 3 </title>
</head>
<body>
    <div id="room3" class="einstein fade-in-slow blocco-interazione">
      <div id="avatarcontenitore3" class="avatar-imm3 d-none">
        <img id="avatarid" src="" alt="Avatar Giocatore" onclick="apriTaccuino()" style="cursor: pointer;">
      </div>
      <div id="introE" class="dossier-box text-center p-5 shadow-lg centraT">
        <p id="testoMacchina3" class="special-elite text-light fs-5 text-start"></p>
        <button id="btnEntra" class="btn btn-outline-light btn-lg mt-4 d-none" onclick="iniziaEsplorazioneE()">
          Esplora
        </button>
      </div>
      <div class="oggetto-cliccabile lavagna-einstein" id="lavagnaE" onclick="apriEnigmaEinstein()"></div>
      <div class="oggetto-cliccabile cassetti" onclick="mostraAtmosferaEinstein()"></div>
      <div class="oggetto-cliccabile ritratto" onclick="mostraIndizioEinstein()"></div>
      <div class="oggetto-cliccabile tavolo2" onclick="mostraTavolo()"></div>
      <div class="oggetto-cliccabile mobile" id="mobileE" onclick="mostraMobile()"></div>
      <div class="oggetto-cliccabile mappamondoE" id="mappamondoE" onclick="mostraMappamondoE()"></div>
      <div class="oggetto-cliccabile luna" onclick="mostraLuna()"></div>
    </div>
    <div class="modal fade" id="EinsteinModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma3 bg-dark text-light border-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="modalTitleE">Formula trovata</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="playfair3" id="descrizioneE"></p>
            <p class="warning3" id="richiestaE"></p>
            <input type="text" id="EinsteinSoluzione" class="form-control form-control-lg text-center special-elite">
          </div>
          <div class="modal-footer border-light">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-light text-dark" id="btnConfermaE"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma3 border-light text-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="infoTitolo">Indizio</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <p class="playfair" id="infoTesto" style="color: #e3e0e2; font-size: 1.3rem;">...</p>
          </div>
          <div class="modal-footer border-light justify-content-center">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Pulsante musica -->
    <audio id="bgMusic" loop>
        <source src="Einstein.mp3" type="audio/mpeg">
    </audio>
    
    <button type="button" class="btn-music-gameT" data-bs-toggle="modal" data-bs-target="#volumeModal">
        <span style="color: #f8fafb;">♫</span>
    </button>

    <div class="modal fade" id="volumeModal" tabindex="-1" aria-labelledby="volumeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content modal-enigma bg-dark text-light border-light">
                <div class="modal-header border-light">
                    <h5 class="modal-title special-elite" id="volumeModalLabel">Volume</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center playfair">
                <label for="volumeSlider" class="form-label mb-3 fs-5">Regola audio</label>
    
                <div class="d-flex align-items-center justify-content-center gap-3">
        
                <i class="bi bi-volume-up" style="font-size: 1.8rem; color: #F8F8FF;"></i>
        
                <input type="range" class="form-range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3" style="width: 70%;">
        
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
