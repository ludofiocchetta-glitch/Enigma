<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Missione </title>
</head>
<body>
    <div id="rotate-message">
        <h2 class="special-elite fs-1"> Attenzione Agente! </h2>
        <p class="playfair mt-3 fs-1">Questo gioco richiede una visione panoramica.</p>
        <p class="special-elite" style="color: #8c9eff; font-size: 2.3rem;">Ruota il tuo dispositivo in orizzontale.</p>
    </div>
    <div id="mission" class="missione fade-in-slow d-flex justify-content-center align-items-center">
        <div class="dossier-box text-center p-5 shadow-lg">
            <img id="avatarScelto" src="" alt="Profilo Agente" class="avatar-mission mb-4">
            <p id="testoMacchina" class="special-elite text-light fs-5 text-start"></p>
            <button id="btnEntra" class="btn btn-outline-light btn-lg mt-4 d-none" onclick="iniziaEscapeRoom()">
                Inizia missione
            </button>
        </div>
    </div>
    <!-- Pulsante musica -->
    <audio id="bgMusic" loop>
        <source src="mission.mp3" type="audio/mpeg">
    </audio>
    
    <button type="button" class="btn-music-gameT" data-bs-toggle="modal" data-bs-target="#volumeModal">
        <span style="color: #f8fafb;">♫</span>
    </button>

    <div class="modal fade" id="volumeModal" tabindex="-1" aria-labelledby="volumeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content modal-enigma bg-dark text-light border-light">
                <div class="modal-header border-light">
                    <h5 class="modal-title special-elite" id="volumeModalLabel">Volume</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center playfair">
                <label for="volumeSlider" class="form-label mb-3 fs-5">Regola audio</label>
    
                <div class="d-flex align-items-center justify-content-center gap-3">
        
                <i class="bi bi-volume-up" style="font-size: 1.8rem; color: #F8F8FF;"></i>
        
                <input type="range" class="form-range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3" style="width: 70%;">
        
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
