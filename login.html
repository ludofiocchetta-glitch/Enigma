<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Login </title>
</head>
<body>
    <div id="user" class="userform fade-in">
        <div class="d-flex flex-column align-items-center">
            <div class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="inputname" class="col-form-label"> Nome agente: </label>
                </div>
                <div class="col-auto">
                    <input type="text" id="inputname" class="form-control">
                </div>
            </div>
            <h3 class="mb-3"> Scegli il tuo profilo scientifico: </h3>
            <div class="d-flex flex-wrap justify-content-center gap-3 gap-md-4 mb-4">
                <label class="avatar-label">
                <input type="radio" name="avatar" value="detective1" class="d-none" checked>
                <img src="Alan Turing.png" alt="Avatar 1" class="avatar-img">
                </label>
                <label class="avatar-label">
                <input type="radio" name="avatar" value="detective2" class="d-none">
                <img src="Marie Curie.png" alt="Avatar 2" class="avatar-img">
                </label>
                <label class="avatar-label">
                <input type="radio" name="avatar" value="detective3" class="d-none">
                <img src="Albert Einstein.png" alt="Avatar 3" class="avatar-img">
                </label>
                <label class="avatar-label">
                <input type="radio" name="avatar" value="detective4" class="d-none">
                <img src="Ada Lovelace.png" alt="Avatar 4" class="avatar-img">
                </label>
            </div>
            <button type="button" class="btn btn-outline-light btn-lg mt-3" onclick="go()"> GO! </button>
        </div>
    </div>
    <!-- Pulsante musica -->
    <audio id="bgMusic" loop>
        <source src="start.mp3" type="audio/mpeg">
    </audio>
    
    <button type="button" class="btn-music-gameT" data-bs-toggle="modal" data-bs-target="#volumeModal">
        <span style="color: #f8fafb;">♫</span>
    </button>

    <div class="modal fade" id="volumeModal" tabindex="-1" aria-labelledby="volumeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content modal-enigma bg-dark text-light border-light">
                <div class="modal-header border-light">
                    <h5 class="modal-title special-elite" id="volumeModalLabel">Volume</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center playfair">
                <label for="volumeSlider" class="form-label mb-3 fs-5">Regola audio</label>
    
                <div class="d-flex align-items-center justify-content-center gap-3">
        
                <i class="bi bi-volume-up" style="font-size: 1.8rem; color: #F8F8FF;"></i>
        
                <input type="range" class="form-range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3" style="width: 70%;">
        
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"> </script>
</html>
