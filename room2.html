<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Enigma-escape room</title>
</head>
<body>
    <div id="room2" class="curie fade-in-slow">
        <div class="avatar-imm">
            <img id="avatarid" src="" alt="Avatar Giocatore">
        </div>
        <div class="oggetto-cliccabile bilancia" onclick="mostraAtmosferaCurie()"></div>
        <div class="oggetto-cliccabile schedario" onclick="mostraIndizioCurie()"></div>
        <div class="oggetto-cliccabile lavagna" onclick="risolviEquazioneFinale()"></div>
    </div>
    <div class="modal fade" id="equazioneModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma bg-dark text-light border-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="modalTitle">Bilanciamento chimico</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="playfair">Agente, dobbiamo bilanciare l'equazione chimica per continuare l'operazione: <b>a</b> Fe + <b>b</b> H₂O → <b>c</b> Fe₃O₄ + <b>d</b> H₂</p>
            <p class="warning">Scrivi i coefficienti stechiometrici nel formato: a,b,c,d</p>
            <input type="text" id="equazioneSoluzione" class="form-control form-control-lg text-center special-elite" placeholder="????">
          </div>
          <div class="modal-footer border-light">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-light text-dark" onclick="controllaEquazione()">Conferma Codice</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma border-light text-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="infoTitolo">Indizio</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <p class="playfair" id="infoTesto" style="color: #8c9eff; font-size: 1.3rem;">...</p>
          </div>
          <div class="modal-footer border-light justify-content-center">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
</body>
<script src="script.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
