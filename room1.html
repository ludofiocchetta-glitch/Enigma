<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Room1 </title>
</head>
<body>
    <div id="room1" class="turing fade-in-slow">
      <div id="avatarcontenitore" class="avatar-imm d-none">
        <img id="avatarid" src="" alt="Avatar Giocatore">
      </div>
      <div id="introT" class="dossier-box text-center p-5 shadow-lg centraT">
        <p id="testoMacchina1" class="special-elite text-light fs-5 text-start"></p>
        <button id="btnEntra" class="btn btn-outline-light btn-lg mt-4 d-none" onclick="iniziaEsplorazioneT()">
          Explore
        </button>
      </div>
      <div class="oggetto-cliccabile macchina-da-scrivere" onclick="mostraEnigmaFinale()"></div>
      <div class="oggetto-cliccabile mappa-mondo" onclick="mostraAtmosferaTuring()"></div>
      <div class="oggetto-cliccabile schedario" onclick="mostraIndizioTuring()"></div>
      <div class="oggetto-cliccabile scatoloni" onclick="mostraScatoloni()"></div>
      <div class="oggetto-cliccabile cappello" onclick="mostraCappello()"></div>
      <div class="oggetto-cliccabile lavagna" onclick="mostraLavagna()"></div>
      <div class="oggetto-cliccabile telefono" onclick="mostraTelefono()"></div>
    </div>
    <div class="modal fade" id="enigmaModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma bg-dark text-light border-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="modalTitle"></h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="playfair" id="descrizione"></p>
            <p class="warning" id="richiesta"></p>
            <input type="text" id="codiceSoluzione" class="form-control form-control-lg text-center special-elite" placeholder="?????">
          </div>
          <div class="modal-footer border-light">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-light text-dark" id="btnConferma"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma border-light text-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="infoTitolo">Indizio</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <p class="playfair" id="infoTesto" style="color: #e3e0e2; font-size: 1.3rem;">...</p>
          </div>
          <div class="modal-footer border-light justify-content-center">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
</body>
<script src="script.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
