<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Room3 </title>
</head>
<body>
    <div id="room3" class="einstein fade-in-slow">
      <div class="avatar-imm3">
        <img id="avatarid" src="" alt="Avatar Giocatore">
      </div>
      <div class="oggetto-cliccabile lavagna-einstein" onclick="apriEnigmaEinstein()"></div>
      <div class="oggetto-cliccabile sedia" onclick="mostraAtmosferaEinstein()"></div>
      <div class="oggetto-cliccabile scartoffie2" onclick="mostraIndizioEinstein()"></div>
      <div class="oggetto-cliccabile scaffali2" onclick="mostraScaffali()"></div>
    </div>
    <div class="modal fade" id="EinsteinModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma3 bg-dark text-light border-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="modalTitle">Equazione della rivoluzione trovata!</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="playfair3">Agente, hai trovato la lavagna con l'equaziome per sbloccare la porta. Ci serve la variabile mancante che Einstein ha trovato per la sua rivoluzione. <br> E=[x]*c^2</p>
            <p class="warning3">Inserisci la variabile:</p>
            <input type="text" id="EinsteinSoluzione" class="form-control form-control-lg text-center special-elite" placeholder="????">
          </div>
          <div class="modal-footer border-light">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-light text-dark" onclick="controllaEinstein()">Conferma Soluzione</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma3 border-light text-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="infoTitolo">Indizio</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <p class="playfair" id="infoTesto" style="color: #e3e0e2; font-size: 1.3rem;">...</p>
          </div>
          <div class="modal-footer border-light justify-content-center">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
</body>
<script src="script.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
