<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,900&family=Special+Elite&display=swap" rel="stylesheet">
    <title> Stanza 2 </title>
</head>
<body>
   <div id="rotate-message">
        <h2 class="special-elite fs-1"> Attenzione Agente! </h2>
        <p class="playfair mt-3 fs-1">Questo gioco richiede una visione panoramica.</p>
        <p class="special-elite" style="color: #8c9eff; font-size: 2.3rem;">Ruota il tuo dispositivo in orizzontale.</p>
    </div>
    <div id="room2" class="curie fade-in-slow blocco-interazione">
      <div id="avatarcontenitore2" class="avatar-imm2 d-none">
        <img id="avatarid" src="" alt="Avatar Giocatore" onclick="apriTaccuino()" style="cursor: pointer;">
      </div>
      <div id="introC" class="dossier-box text-center p-5 shadow-lg centraT">
        <p id="testoMacchina2" class="special-elite text-light fs-5 text-start"></p>
        <button id="btnEntra" class="btn btn-outline-light btn-lg mt-4 d-none" onclick="iniziaEsplorazioneC()">
          Esplora
        </button>
      </div>
      <div class="oggetto-cliccabile tavolo" onclick="mostraAtmosferaCurie()"></div>
      <div class="oggetto-cliccabile foglio" onclick="mostraIndizioCurie()"></div>
      <div class="oggetto-cliccabile scaffale" onclick="mostraScaffale()"></div>
      <div class="oggetto-cliccabile bilancia" id="bilanciaC" onclick="mostraBilancia()"></div>
      <div class="oggetto-cliccabile pozioni" id="pozioniC" onclick="mostraPozioni()"></div>
      <div class="oggetto-cliccabile lavagna2" id="lavagnaC" onclick="risolviEquazioneFinale()"></div>
    </div>
    <div class="modal fade" id="CurieModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma2 bg-dark text-light border-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="modalTitleC">Bilanciamento chimico</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="playfair2" id="descrizioneC"></p>
            <p class="warning2" id="richiestaC"></p>
            <input type="text" id="CurieSoluzione" class="form-control form-control-lg text-center special-elite" placeholder="????">
          </div>
          <div class="modal-footer border-light">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
            <button type="button" class="btn btn-light text-dark" id="btnConfermaC"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-enigma2 border-light text-light">
          <div class="modal-header border-light">
            <h5 class="modal-title special-elite" id="infoTitolo">Indizio</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <p class="playfair" id="infoTesto" style="color: #e3e0e2; font-size: 1.3rem;">...</p>
          </div>
          <div class="modal-footer border-light justify-content-center">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Pulsante musica -->
    <audio id="bgMusic" loop>
        <source src="room2.mp3" type="audio/mpeg">
    </audio>
    
    <button type="button" class="btn-music-gameT" data-bs-toggle="modal" data-bs-target="#volumeModal">
        <span style="color: #f8fafb;">♫</span>
    </button>

    <div class="modal fade" id="volumeModal" tabindex="-1" aria-labelledby="volumeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content modal-enigma bg-dark text-light border-light">
                <div class="modal-header border-light">
                    <h5 class="modal-title special-elite" id="volumeModalLabel">Volume</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center playfair">
                <label for="volumeSlider" class="form-label mb-3 fs-5">Regola audio</label>
    
                <div class="d-flex align-items-center justify-content-center gap-3">
        
                <i class="bi bi-volume-up" style="font-size: 1.8rem; color: #F8F8FF;"></i>
        
                <input type="range" class="form-range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3" style="width: 70%;">
        
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
